<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset password — AlohaOne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/alohaone.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="brand">Aloha<span class="brand-gradient">One</span></div>
        <p class="auth-subtitle" id="subtitle">Reset your password</p>

        <div id="alert-area"></div>

        <!-- ===== STEP 1: request code ===== -->
        <form id="request-form">
            <p class="text-muted small">Enter your AlohaOne email and we'll send you a verification code.</p>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required autocomplete="email">
            </div>
            <button type="submit" class="btn btn-primary w-100" id="btn-request">Send reset code</button>
        </form>

        <!-- ===== STEP 2: enter code + new password ===== -->
        <form id="reset-form" style="display:none">
            <p class="text-muted small">
                We sent a verification code to <strong id="reset-email-display"></strong>.
                Enter it below along with your new password.
            </p>
            <div class="mb-3">
                <label for="code" class="form-label">Verification code</label>
                <input type="text" id="code" class="form-control text-center" required
                       maxlength="6" pattern="[0-9]{6}" placeholder="------"
                       style="font-size:1.5rem;letter-spacing:0.3em;">
            </div>
            <div class="mb-3">
                <label for="new-password" class="form-label">New password</label>
                <input type="password" id="new-password" class="form-control" required minlength="8" autocomplete="new-password">
                <div class="form-text">Minimum 8 characters, uppercase, lowercase, number.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="btn-reset">Reset password</button>
            <div class="auth-footer">
                <a href="#" id="link-resend">Didn't get the code? Resend it.</a>
            </div>
        </form>

        <div class="auth-footer">
            Remembered it? <a href="#" id="link-login">Sign in here</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/alohaone.js"></script>
    <script>
        const CFG = window.ALOHAONE_CONFIG;
        let pendingEmail = '';

        // Forward the entire query string so ?platform/?tier/?next survive the
        // bounce back to login.html if the user decides they remember their
        // password mid-flow.
        const fullQuery = window.location.search || '';
        $('#link-login').href = 'login.html' + fullQuery;

        async function cognitoCall(target, body) {
            const r = await fetch(CFG.COGNITO_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-amz-json-1.1',
                    'X-Amz-Target': 'AWSCognitoIdentityProviderService.' + target
                },
                body: JSON.stringify(body)
            });
            const data = await r.json();
            if (!r.ok) throw new Error(data.message || data.__type || target + ' failed');
            return data;
        }

        function showForm(which) {
            $('#request-form').style.display = which === 'request' ? '' : 'none';
            $('#reset-form').style.display   = which === 'reset'   ? '' : 'none';
            $('#alert-area').innerHTML = '';
        }

        // ── Step 1: ForgotPassword ─────────────────────────────────────────────
        $('#request-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = $('#btn-request');
            btn.disabled = true; btn.textContent = 'Sending…';

            const email = $('#email').value.trim();
            try {
                await cognitoCall('ForgotPassword', {
                    ClientId: CFG.COGNITO_CLIENT_ID,
                    Username: email
                });
                pendingEmail = email;
                $('#reset-email-display').textContent = email;
                showForm('reset');
            } catch (err) {
                showError(err.message);
                btn.disabled = false; btn.textContent = 'Send reset code';
            }
        });

        // ── Step 2: ConfirmForgotPassword ──────────────────────────────────────
        $('#reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = $('#btn-reset');
            btn.disabled = true; btn.textContent = 'Resetting…';

            const code = $('#code').value.trim();
            const newPassword = $('#new-password').value;

            try {
                await cognitoCall('ConfirmForgotPassword', {
                    ClientId: CFG.COGNITO_CLIENT_ID,
                    Username: pendingEmail,
                    ConfirmationCode: code,
                    Password: newPassword
                });
                showSuccess('Password reset. Redirecting to sign in…');
                setTimeout(() => {
                    window.location.href = 'login.html' + fullQuery;
                }, 1500);
            } catch (err) {
                showError(err.message);
                btn.disabled = false; btn.textContent = 'Reset password';
            }
        });

        // ── Resend code ────────────────────────────────────────────────────────
        $('#link-resend').addEventListener('click', async (e) => {
            e.preventDefault();
            if (!pendingEmail) return;
            try {
                await cognitoCall('ForgotPassword', {
                    ClientId: CFG.COGNITO_CLIENT_ID,
                    Username: pendingEmail
                });
                showSuccess('New code sent to ' + pendingEmail);
            } catch (err) {
                showError(err.message);
            }
        });
    </script>
</body>
</html>
