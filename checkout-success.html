<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription confirmed — AlohaOne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/alohaone.css" rel="stylesheet">
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div class="top-bar">
            <h1>Subscription confirmed</h1>
        </div>

        <div class="card text-center py-5 mx-auto" style="max-width:600px">
            <div class="card-body">
                <div class="mb-3" style="font-size:3rem;color:#16a34a">
                    <i class="fa-solid fa-circle-check"></i>
                </div>
                <h4 class="mb-3">You're all set!</h4>
                <p class="text-muted mb-4" id="success-message">
                    Your subscription is active. It may take a few seconds for
                    all platforms to reflect the change as Stripe finalizes
                    the payment.
                </p>
                <div id="success-session" class="small text-muted mb-4" style="display:none">
                    Stripe session: <code id="success-session-id"></code>
                </div>
                <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                    <a href="dashboard.html" class="btn btn-primary">
                        <i class="fa-solid fa-gauge-high me-1"></i> Go to Dashboard
                    </a>
                    <a href="billing.html" class="btn btn-outline-secondary">
                        <i class="fa-solid fa-credit-card me-1"></i> View Billing
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/alohaone.js"></script>
    <script>
        if (requireAuth()) {
            initAppShell('catalog').then(() => {
                // Stripe returns with ?session_id=cs_test_... Show it to the
                // user mostly for support/debug confidence, then clear the
                // cart so they start fresh next time.
                const sessionId = qs('session_id');
                if (sessionId) {
                    document.getElementById('success-session').style.display = '';
                    document.getElementById('success-session-id').textContent = sessionId;
                }
                clearCart();
                logActivity('checkout.completed', { sessionId });
            });
        }
    </script>
</body>
</html>
