<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — AlohaOne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/alohaone.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="brand">Aloha<span class="brand-gradient">One</span></div>
        <p class="auth-subtitle">Create your AlohaOne account</p>

        <div id="alert-area"></div>

        <form id="register-form">
            <div class="mb-3">
                <label for="displayName" class="form-label">Your Name</label>
                <input type="text" id="displayName" class="form-control" required autocomplete="name">
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required autocomplete="email">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required minlength="8" autocomplete="new-password">
                <div class="form-text">Minimum 8 characters.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Create Account</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="#" id="link-login">Sign in</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/alohaone.js"></script>
    <script>
        const next = qs('next');
        const loginHref = next ? `login.html?next=${encodeURIComponent(next)}` : 'login.html';
        $('#link-login').href = loginHref;

        $('#register-form').addEventListener('submit', e => {
            e.preventDefault();
            const displayName = $('#displayName').value.trim();
            const email       = $('#email').value.trim();
            const password    = $('#password').value;
            if (!email || !password || password.length < 8) {
                showError('Please fill in all fields. Password must be at least 8 characters.');
                return;
            }
            try {
                stubRegister({ email, displayName, password });
                window.location.href = next || 'index.html';
            } catch (err) {
                showError(err.message || 'Registration failed.');
            }
        });
    </script>
</body>
</html>
