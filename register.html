<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — AlohaOne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/alohaone.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="brand">Aloha<span class="brand-gradient">One</span></div>
        <p class="auth-subtitle">Create your AlohaOne account</p>

        <div id="alert-area"></div>

        <!-- ===== REGISTER FORM ===== -->
        <form id="register-form">
            <div class="row mb-3">
                <div class="col">
                    <label for="firstName" class="form-label">First Name</label>
                    <input type="text" id="firstName" class="form-control" required autocomplete="given-name">
                </div>
                <div class="col">
                    <label for="lastName" class="form-label">Last Name</label>
                    <input type="text" id="lastName" class="form-control" required autocomplete="family-name">
                </div>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required autocomplete="email">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required minlength="8" autocomplete="new-password">
                <div class="form-text">Minimum 8 characters, uppercase, lowercase, number.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="btn-register">Create Account</button>
        </form>

        <!-- ===== VERIFY EMAIL FORM ===== -->
        <form id="verify-form" style="display:none">
            <p class="auth-subtitle">We sent a verification code to <strong id="verify-email-display"></strong></p>
            <div class="mb-3">
                <label for="verify-code" class="form-label">Verification Code</label>
                <input type="text" id="verify-code" class="form-control text-center" required
                       maxlength="6" pattern="[0-9]{6}" placeholder="------" style="font-size:1.5rem;letter-spacing:0.3em;">
            </div>
            <button type="submit" class="btn btn-primary w-100" id="btn-verify">Verify &amp; Continue</button>
            <div class="auth-footer">
                <a href="#" id="link-resend">Resend code</a>
            </div>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="#" id="link-login">Sign in</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/alohaone.js"></script>
    <script>
        const CFG = window.ALOHAONE_CONFIG;
        let pendingEmail = '';
        let pendingPassword = '';

        // Preserve ?next= across pages
        const next = qs('next');
        const loginHref = next ? `login.html?next=${encodeURIComponent(next)}` : 'login.html';
        $('#link-login').href = loginHref;

        function showForm(which) {
            $('#register-form').style.display = which === 'register' ? '' : 'none';
            $('#verify-form').style.display   = which === 'verify'   ? '' : 'none';
            $('#alert-area').innerHTML = '';
        }

        async function cognitoCall(target, body) {
            const r = await fetch(CFG.COGNITO_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-amz-json-1.1',
                    'X-Amz-Target': 'AWSCognitoIdentityProviderService.' + target
                },
                body: JSON.stringify(body)
            });
            const data = await r.json();
            if (!r.ok) throw new Error(data.message || data.__type || target + ' failed');
            return data;
        }

        // ── Register ───────────────────────────────────────────────────────────
        $('#register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = $('#btn-register');
            btn.disabled = true; btn.textContent = 'Creating account…';

            const firstName = $('#firstName').value.trim();
            const lastName  = $('#lastName').value.trim();
            const email     = $('#email').value.trim();
            const password  = $('#password').value;

            try {
                const resp = await cognitoCall('SignUp', {
                    ClientId: CFG.COGNITO_CLIENT_ID,
                    Username: email,
                    Password: password,
                    UserAttributes: [
                        { Name: 'email', Value: email },
                        { Name: 'name',  Value: (firstName + ' ' + lastName).trim() }
                    ]
                });

                pendingEmail    = email;
                pendingPassword = password;
                $('#verify-email-display').textContent = email;

                if (resp.UserConfirmed) {
                    // Auto-confirmed (e.g. dev admin-confirm). Skip verify step.
                    showSuccess('Account created! Signing you in…');
                    await autoLoginAndRedirect(email, password);
                } else {
                    showForm('verify');
                }
            } catch (err) {
                showError(err.message);
                btn.disabled = false; btn.textContent = 'Create Account';
            }
        });

        // ── Verify email ───────────────────────────────────────────────────────
        $('#verify-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = $('#btn-verify');
            btn.disabled = true; btn.textContent = 'Verifying…';

            const code = $('#verify-code').value.trim();
            try {
                await cognitoCall('ConfirmSignUp', {
                    ClientId: CFG.COGNITO_CLIENT_ID,
                    Username: pendingEmail,
                    ConfirmationCode: code
                });
                showSuccess('Email verified. Signing you in…');
                await autoLoginAndRedirect(pendingEmail, pendingPassword);
            } catch (err) {
                showError(err.message);
                btn.disabled = false; btn.textContent = 'Verify & Continue';
            }
        });

        // ── Resend verification code ───────────────────────────────────────────
        $('#link-resend').addEventListener('click', async (e) => {
            e.preventDefault();
            if (!pendingEmail) { showError('No pending email to resend to.'); return; }
            try {
                await cognitoCall('ResendConfirmationCode', {
                    ClientId: CFG.COGNITO_CLIENT_ID,
                    Username: pendingEmail
                });
                showSuccess('New verification code sent to ' + pendingEmail);
            } catch (err) {
                showError(err.message);
            }
        });

        // Sign in immediately after successful registration + verification,
        // then land at `next` or the default home page. This is the only place
        // we auto-login from register.html — users with pre-existing accounts
        // go through login.html normally.
        async function autoLoginAndRedirect(email, password) {
            try {
                const auth = await cognitoCall('InitiateAuth', {
                    AuthFlow: 'USER_PASSWORD_AUTH',
                    ClientId: CFG.COGNITO_CLIENT_ID,
                    AuthParameters: { USERNAME: email, PASSWORD: password }
                });
                setToken(auth.AuthenticationResult.IdToken);
                setUser({ email, displayName: email.split('@')[0] });

                // Provision the default Commerce store for this brand-new user.
                // Non-fatal if it fails — the user can still log in and poke around.
                await provisionCommerce();

                window.location.href = next || 'index.html';
            } catch (err) {
                // If auto-login fails for any reason, send user to login page.
                showError('Signed up successfully, but auto-login failed: ' + err.message);
                setTimeout(() => window.location.href = loginHref, 2000);
            }
        }
    </script>
</body>
</html>
