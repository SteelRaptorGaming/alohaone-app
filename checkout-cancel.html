<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout canceled — AlohaOne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/alohaone.css" rel="stylesheet">
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div class="top-bar">
            <h1>Checkout canceled</h1>
        </div>

        <div class="card text-center py-5 mx-auto" style="max-width:600px">
            <div class="card-body">
                <div class="mb-3" style="font-size:3rem;color:#6b7280">
                    <i class="fa-solid fa-circle-xmark"></i>
                </div>
                <h4 class="mb-3">No worries — nothing was charged.</h4>
                <p class="text-muted mb-4">
                    Your cart is still intact. You can continue shopping or
                    head back to the cart to try again.
                </p>
                <div class="d-grid gap-2 d-md-flex justify-content-md-center">
                    <a href="cart.html" class="btn btn-primary">
                        <i class="fa-solid fa-cart-shopping me-1"></i> Back to Cart
                    </a>
                    <a href="catalog.html" class="btn btn-outline-secondary">
                        <i class="fa-solid fa-layer-group me-1"></i> Browse Catalog
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/alohaone.js"></script>
    <script>
        if (requireAuth()) {
            initAppShell('catalog');
            logActivity('checkout.canceled');
        }
    </script>
</body>
</html>
