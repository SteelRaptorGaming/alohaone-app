<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — AlohaOne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/alohaone.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="brand">Aloha<span class="brand-gradient">One</span></div>
        <p class="auth-subtitle">Sign in to manage your platforms</p>

        <div id="alert-area"></div>

        <form id="login-form">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required autocomplete="email">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>

        <div class="auth-footer">
            Don't have an account? <a href="#" id="link-register">Register now</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/alohaone.js"></script>
    <script>
        // Preserve ?next= through to register if user clicks the link
        const next = qs('next');
        const registerHref = next ? `register.html?next=${encodeURIComponent(next)}` : 'register.html';
        $('#link-register').href = registerHref;

        // Stubbed login — accepts any credentials
        $('#login-form').addEventListener('submit', e => {
            e.preventDefault();
            const email    = $('#email').value.trim();
            const password = $('#password').value;
            if (!email || !password) { showError('Email and password required.'); return; }
            try {
                stubLogin({ email, password });
                window.location.href = next || 'dashboard.html';
            } catch (err) {
                showError(err.message || 'Login failed.');
            }
        });
    </script>
</body>
</html>
