<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — AlohaOne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/alohaone.css" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="brand">Aloha<span class="brand-gradient">One</span></div>
        <p class="auth-subtitle">Sign in to manage your platforms</p>

        <div id="alert-area"></div>

        <form id="login-form">
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" class="form-control" required autocomplete="email">
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-control" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn btn-primary w-100" id="btn-login">Sign In</button>
        </form>

        <div class="auth-footer">
            <a href="#" id="link-forgot">Forgot your password?</a>
        </div>
        <div class="auth-footer">
            Don't have an account? <a href="#" id="link-register">Register here</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/alohaone.js"></script>
    <script>
        const CFG = window.ALOHAONE_CONFIG;

        // Forward the entire query string to the register page so parameters
        // like ?platform=commerce&tier=pro&intent=register survive the bounce
        // between login and register.
        const fullQuery = window.location.search || '';
        $('#link-register').href = 'register.html' + fullQuery;
        $('#link-forgot').href   = 'forgot-password.html' + fullQuery;

        // Already logged in? Process any post-auth params and redirect.
        if (getToken()) {
            redirectPostAuth();
        }

        async function cognitoCall(target, body) {
            const r = await fetch(CFG.COGNITO_ENDPOINT, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-amz-json-1.1',
                    'X-Amz-Target': 'AWSCognitoIdentityProviderService.' + target
                },
                body: JSON.stringify(body)
            });
            const data = await r.json();
            if (!r.ok) throw new Error(data.message || data.__type || target + ' failed');
            return data;
        }

        $('#login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = $('#btn-login');
            btn.disabled = true; btn.textContent = 'Signing in…';

            const email    = $('#email').value.trim();
            const password = $('#password').value;
            if (!email || !password) {
                showError('Email and password required.');
                btn.disabled = false; btn.textContent = 'Sign In';
                return;
            }

            try {
                const auth = await cognitoCall('InitiateAuth', {
                    AuthFlow: 'USER_PASSWORD_AUTH',
                    ClientId: CFG.COGNITO_CLIENT_ID,
                    AuthParameters: { USERNAME: email, PASSWORD: password }
                });

                if (auth.ChallengeName === 'NEW_PASSWORD_REQUIRED') {
                    const newPass = prompt('Please set a new password:');
                    if (!newPass) { btn.disabled = false; btn.textContent = 'Sign In'; return; }
                    const challenged = await cognitoCall('RespondToAuthChallenge', {
                        ChallengeName: 'NEW_PASSWORD_REQUIRED',
                        ClientId: CFG.COGNITO_CLIENT_ID,
                        ChallengeResponses: { USERNAME: email, NEW_PASSWORD: newPass },
                        Session: auth.Session
                    });
                    auth.AuthenticationResult = challenged.AuthenticationResult;
                }

                setAuthTokens(auth.AuthenticationResult);
                setUser({ email, displayName: email.split('@')[0] });

                // Provision or sync the Commerce store on every login — idempotent
                // server-side. The first call creates the store + org; subsequent
                // calls just update last_login_at.
                await provisionCommerce();

                redirectPostAuth();
            } catch (err) {
                showError(err.message || 'Login failed.');
                $('#btn-login').disabled = false; $('#btn-login').textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
