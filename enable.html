<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enable Platform — AlohaOne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/alohaone.css" rel="stylesheet">
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div class="top-bar">
            <h1 id="page-title">Enable Platform</h1>
            <a href="platforms.html" class="btn btn-sm btn-outline-secondary">
                <i class="fa-solid fa-arrow-left me-1"></i> All Platforms
            </a>
        </div>
        <div id="alert-area"></div>

        <div id="content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/alohaone.js"></script>
    <script src="js/platforms-data.js"></script>
    <script>
        if (requireAuth()) {
            initAppShell('platforms').then(loadEnable);
        }

        function loadEnable() {
            const slug = qs('platform');
            if (!slug) {
                $('#content').innerHTML = '<div class="alert alert-warning">No platform specified. <a href="platforms.html">Browse platforms</a>.</div>';
                return;
            }
            const p = getPlatform(slug);
            if (!p) {
                $('#content').innerHTML = `<div class="alert alert-danger">Platform <code>${slug}</code> not found. <a href="platforms.html">Back to platforms</a>.</div>`;
                return;
            }

            $('#page-title').textContent = p.name;

            const isEnabled  = isPlatformEnabled(slug);
            const isComing   = p.status === 'coming';
            const enabledCaps = new Set(getEnabledCapabilities(slug));

            // If coming soon — just show a notice and let user join the waitlist.
            if (isComing) {
                $('#content').innerHTML = `
                    <div class="enable-hero">
                        <div class="enable-icon" style="background:${p.gradient}">
                            <i class="fa-solid ${p.icon}"></i>
                        </div>
                        <div class="flex-grow-1">
                            <h2>${p.name}</h2>
                            <p>${p.tagline}</p>
                        </div>
                        <span class="platform-status status-coming">Coming Soon</span>
                    </div>
                    <div class="alert alert-info">
                        <i class="fa-solid fa-info-circle me-2"></i>
                        ${p.name} isn't available yet. Keep an eye on your dashboard — we'll notify you as soon as it's ready to enable.
                    </div>`;
                return;
            }

            // Build capabilities list
            const caps = p.capabilities || [];
            const capRows = caps.length ? caps.map(c => `
                <div class="capability-row">
                    <div class="cap-info me-3">
                        <h6>${c.name}</h6>
                        <p>${c.description}</p>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input cap-toggle" type="checkbox"
                               id="cap-${c.id}" data-cap-id="${c.id}"
                               ${enabledCaps.has(c.id) || (!isEnabled && c.default) ? 'checked' : ''}>
                    </div>
                </div>
            `).join('') : '<p class="text-muted">No granular capabilities — enabling the platform turns everything on.</p>';

            // Pricing summary
            let pricingHtml = '';
            if (p.bundledIn) {
                const parent = getPlatform(p.bundledIn);
                pricingHtml = `
                    <div class="alert alert-info mb-0">
                        <i class="fa-solid fa-gift me-2"></i>
                        <strong>Included with ${parent?.name || p.bundledIn}.</strong>
                        No additional charge — turn it on and you're done.
                    </div>`;
            } else if (p.pricing?.free) {
                const free = p.pricing.free;
                const paid = p.pricing.paid;
                pricingHtml = `
                    <div class="row g-3">
                        <div class="col-md-6">
                            <div class="p-3 border rounded">
                                <div class="small text-muted text-uppercase fw-bold">Free tier</div>
                                <div class="fs-4 fw-bold">${free.label}</div>
                                <div class="text-muted">$${free.price}</div>
                            </div>
                        </div>
                        ${paid ? `
                        <div class="col-md-6">
                            <div class="p-3 border rounded" style="border-color:var(--ao-primary)!important;">
                                <div class="small text-muted text-uppercase fw-bold">Upgrade anytime</div>
                                <div class="fs-4 fw-bold">${paid.label}</div>
                                <div class="text-muted">$${paid.price} ${paid.period || ''}</div>
                            </div>
                        </div>` : ''}
                    </div>`;
            }

            // Primary button label
            const btnLabel = isEnabled ? '<i class="fa-solid fa-check me-1"></i> Enabled' : '<i class="fa-solid fa-bolt me-1"></i> Enable ' + p.shortName;
            const btnClass = isEnabled ? 'btn btn-success' : 'btn btn-tropical';
            const disableBtn = isEnabled
                ? `<button type="button" class="btn btn-outline-danger" id="btn-disable">
                       <i class="fa-solid fa-power-off me-1"></i> Disable ${p.shortName}
                   </button>`
                : '';

            $('#content').innerHTML = `
                <div class="enable-hero">
                    <div class="enable-icon" style="background:${p.gradient}">
                        <i class="fa-solid ${p.icon}"></i>
                    </div>
                    <div class="flex-grow-1">
                        <h2>${p.name}</h2>
                        <p>${p.tagline}</p>
                    </div>
                    ${isEnabled ? '<span class="platform-status status-enabled"><i class="fa-solid fa-check me-1"></i>Enabled</span>' : ''}
                </div>

                <div class="row g-4">
                    <div class="col-lg-7">
                        <div class="card">
                            <div class="card-header">
                                <h5 class="mb-0">Capabilities</h5>
                            </div>
                            <div class="card-body">
                                ${capRows}
                            </div>
                        </div>
                    </div>
                    <div class="col-lg-5">
                        <div class="card mb-3">
                            <div class="card-header">
                                <h5 class="mb-0">Pricing</h5>
                            </div>
                            <div class="card-body">${pricingHtml}</div>
                        </div>
                        <div class="d-grid gap-2">
                            <button type="button" class="${btnClass}" id="btn-enable" ${isEnabled ? 'disabled' : ''}>
                                ${btnLabel}
                            </button>
                            ${disableBtn}
                            <a href="dashboard.html" class="btn btn-link text-decoration-none">Back to Dashboard</a>
                        </div>
                    </div>
                </div>
            `;

            // Wire up toggles and buttons
            $$('.cap-toggle').forEach(toggle => {
                toggle.addEventListener('change', () => {
                    if (!isPlatformEnabled(slug)) return;  // save only if platform is enabled
                    const active = Array.from($$('.cap-toggle'))
                        .filter(t => t.checked)
                        .map(t => t.dataset.capId);
                    setEnabledCapabilities(slug, active);
                    showSuccess(`${p.name} capabilities updated.`);
                });
            });

            $('#btn-enable')?.addEventListener('click', () => {
                if (isPlatformEnabled(slug)) return;
                // Save whatever toggles are checked right now as the initial capability set
                const active = Array.from($$('.cap-toggle'))
                    .filter(t => t.checked)
                    .map(t => t.dataset.capId);
                enablePlatform(slug);
                setEnabledCapabilities(slug, active);
                showSuccess(`${p.name} enabled!`);
                setTimeout(() => window.location.reload(), 600);
            });

            $('#btn-disable')?.addEventListener('click', () => {
                if (!confirm(`Disable ${p.name}? Your data is preserved, but the capability will be turned off.`)) return;
                disablePlatform(slug);
                setEnabledCapabilities(slug, []);
                showSuccess(`${p.name} disabled.`);
                setTimeout(() => window.location.reload(), 600);
            });
        }
    </script>
</body>
</html>
