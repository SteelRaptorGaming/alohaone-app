<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — AlohaOne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/alohaone.css" rel="stylesheet">
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div class="top-bar">
            <h1>Dashboard</h1>
            <a href="platforms.html" class="btn btn-tropical">
                <i class="fa-solid fa-plus me-1"></i> Browse Platforms
            </a>
        </div>
        <div id="alert-area"></div>

        <!-- Stats row -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon" style="background: linear-gradient(135deg,#0891b2,#0e7490)">
                            <i class="fa-solid fa-layer-group"></i>
                        </div>
                        <div class="stat-label">Enabled Platforms</div>
                        <div class="stat-value" id="stat-enabled">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon" style="background: linear-gradient(135deg,#10b981,#059669)">
                            <i class="fa-solid fa-toggle-on"></i>
                        </div>
                        <div class="stat-label">Active Capabilities</div>
                        <div class="stat-value" id="stat-capabilities">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon" style="background: linear-gradient(135deg,#f59e0b,#d97706)">
                            <i class="fa-solid fa-dollar-sign"></i>
                        </div>
                        <div class="stat-label">Monthly Cost</div>
                        <div class="stat-value" id="stat-cost">$0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon" style="background: linear-gradient(135deg,#ec4899,#be185d)">
                            <i class="fa-solid fa-wave-square"></i>
                        </div>
                        <div class="stat-label">Recent Activity</div>
                        <div class="stat-value" id="stat-activity">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Enabled platforms -->
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Your Enabled Platforms</h5>
                <a href="platforms.html" class="btn btn-sm btn-outline-primary">Manage All</a>
            </div>
            <div class="card-body">
                <div class="row g-3" id="enabled-grid">
                    <div class="col-12 empty-state" id="enabled-empty" style="display:none;">
                        <i class="fa-solid fa-layer-group"></i>
                        <p class="mb-3">No platforms enabled yet.</p>
                        <a href="platforms.html" class="btn btn-tropical">Browse Platforms to Enable</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent activity -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Recent Activity</h5>
                <a href="history.html" class="btn btn-sm btn-outline-primary">View All</a>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr><th style="padding-left:1.25rem">Event</th><th>Details</th><th style="padding-right:1.25rem">When</th></tr>
                    </thead>
                    <tbody id="activity-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/alohaone.js"></script>
    <script>
        if (requireAuth()) {
            initAppShell('dashboard').then(loadDashboard);
        }

        // Status a subscription must have to count as "actively subscribed"
        // for UI purposes. past_due and canceled still show up on the
        // billing page but don't get a green tile here.
        const ACTIVE_STATUSES = new Set(['active', 'trialing']);

        async function loadDashboard() {
            // Recent activity (still local — activity feed endpoint is stubbed)
            const log = getActivityLog();
            $('#stat-activity').textContent = log.length;
            renderRecentActivity(log);

            let subs = [];
            let catalog = { platforms: [], tiers: [] };
            try {
                [subs, catalog] = await Promise.all([
                    sharedFetch('/api/me/subscriptions'),
                    sharedFetch('/api/catalog'),
                ]);
            } catch (err) {
                showError('Could not load subscriptions: ' + err.message);
                return;
            }

            const activeSubs = (subs.subscriptions || [])
                .filter(s => ACTIVE_STATUSES.has(s.status) && s.platform_enabled);

            // Stats row: enabled platforms = active subs; monthly cost = sum
            $('#stat-enabled').textContent = activeSubs.length;
            const totalCents = activeSubs.reduce(
                (n, s) => n + (s.monthly_price_cents || 0), 0);
            $('#stat-cost').textContent = '$' + (totalCents / 100).toFixed(2);
            // Capabilities column: we no longer track those server-side, so
            // fall back to "tiers" (one per active subscription).
            $('#stat-capabilities').textContent = activeSubs.length;

            renderPlatformGrid(activeSubs, catalog.platforms || []);
        }

        function renderPlatformGrid(activeSubs, catalogPlatforms) {
            const grid = $('#enabled-grid');
            const empty = $('#enabled-empty');

            // Index subscribed platform ids for quick lookup.
            const subByPlatform = new Map(activeSubs.map(s => [s.platform_id, s]));

            if (activeSubs.length === 0 && catalogPlatforms.length === 0) {
                empty.style.display = 'block';
                return;
            }
            empty.style.display = 'none';

            // Primary tiles: platforms the user is actually subscribed to.
            const activeTiles = activeSubs.map(s => `
                <div class="col-md-6 col-lg-4">
                    <a href="platforms.html" class="platform-card enabled d-block text-decoration-none text-dark">
                        <div class="platform-icon" style="background:linear-gradient(135deg,#0ea5e9,#0369a1)">
                            <i class="${escapeHtmlAttr(s.platform_icon || 'fa-solid fa-cube')}"></i>
                        </div>
                        <h5>${escapeHtmlText(s.platform_name)}</h5>
                        <p class="platform-tagline">
                            ${escapeHtmlText(s.tier_name || 'Active plan')} —
                            $${((s.monthly_price_cents || 0) / 100).toFixed(2)}/mo
                        </p>
                        <span class="platform-status status-enabled">
                            <i class="fa-solid fa-check me-1"></i>Active
                        </span>
                    </a>
                </div>`).join('');

            // Secondary tiles: enabled-in-catalog platforms the user can
            // subscribe to but hasn't yet. Disabled tile per hide-vs-disabled
            // rule — rendered greyed out with a "Subscribe" CTA.
            const upsellPlatforms = catalogPlatforms.filter(p => !subByPlatform.has(p.id));
            const upsellTiles = upsellPlatforms.map(p => `
                <div class="col-md-6 col-lg-4">
                    <a href="catalog.html" class="platform-card d-block text-decoration-none text-dark" style="opacity:0.75">
                        <div class="platform-icon" style="background:linear-gradient(135deg,#94a3b8,#475569)">
                            <i class="${escapeHtmlAttr(p.icon || 'fa-solid fa-cube')}"></i>
                        </div>
                        <h5>${escapeHtmlText(p.name)}</h5>
                        <p class="platform-tagline">${escapeHtmlText(p.description || '')}</p>
                        <span class="platform-status status-available">
                            <i class="fa-solid fa-plus me-1"></i>Subscribe
                        </span>
                    </a>
                </div>`).join('');

            grid.innerHTML = activeTiles + upsellTiles;
        }

        function renderRecentActivity(log) {
            const recent = log.slice(0, 5);
            const tbody = $('#activity-body');
            if (recent.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="empty-state"><i class="fa-solid fa-wave-square"></i><br>No activity yet</td></tr>';
                return;
            }
            tbody.innerHTML = recent.map(entry => `
                <tr>
                    <td style="padding-left:1.25rem"><code>${escapeHtmlText(entry.type)}</code></td>
                    <td class="text-muted small">${escapeHtmlText(JSON.stringify(entry.payload))}</td>
                    <td style="padding-right:1.25rem" class="text-muted small">${formatDateTime(entry.at)}</td>
                </tr>
            `).join('');
        }

        function escapeHtmlText(s) {
            if (s == null) return '';
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }
        function escapeHtmlAttr(s) {
            return escapeHtmlText(s).replace(/"/g, '&quot;');
        }
    </script>
</body>
</html>
