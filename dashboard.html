<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — AlohaOne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/alohaone.css" rel="stylesheet">
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div class="top-bar">
            <h1>Dashboard</h1>
            <a href="platforms.html" class="btn btn-tropical">
                <i class="fa-solid fa-plus me-1"></i> Browse Platforms
            </a>
        </div>
        <div id="alert-area"></div>

        <!-- Stats row -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon" style="background: linear-gradient(135deg,#0891b2,#0e7490)">
                            <i class="fa-solid fa-layer-group"></i>
                        </div>
                        <div class="stat-label">Enabled Platforms</div>
                        <div class="stat-value" id="stat-enabled">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon" style="background: linear-gradient(135deg,#10b981,#059669)">
                            <i class="fa-solid fa-toggle-on"></i>
                        </div>
                        <div class="stat-label">Active Capabilities</div>
                        <div class="stat-value" id="stat-capabilities">0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon" style="background: linear-gradient(135deg,#f59e0b,#d97706)">
                            <i class="fa-solid fa-dollar-sign"></i>
                        </div>
                        <div class="stat-label">Monthly Cost</div>
                        <div class="stat-value" id="stat-cost">$0</div>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon" style="background: linear-gradient(135deg,#ec4899,#be185d)">
                            <i class="fa-solid fa-wave-square"></i>
                        </div>
                        <div class="stat-label">Recent Activity</div>
                        <div class="stat-value" id="stat-activity">0</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Enabled platforms -->
        <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Your Enabled Platforms</h5>
                <a href="platforms.html" class="btn btn-sm btn-outline-primary">Manage All</a>
            </div>
            <div class="card-body">
                <div class="row g-3" id="enabled-grid">
                    <div class="col-12 empty-state" id="enabled-empty" style="display:none;">
                        <i class="fa-solid fa-layer-group"></i>
                        <p class="mb-3">No platforms enabled yet.</p>
                        <a href="platforms.html" class="btn btn-tropical">Browse Platforms to Enable</a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent activity -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Recent Activity</h5>
                <a href="history.html" class="btn btn-sm btn-outline-primary">View All</a>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr><th style="padding-left:1.25rem">Event</th><th>Details</th><th style="padding-right:1.25rem">When</th></tr>
                    </thead>
                    <tbody id="activity-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/alohaone.js"></script>
    <script src="js/platforms-data.js"></script>
    <script>
        if (requireAuth()) {
            initAppShell('dashboard').then(loadDashboard);
        }

        function loadDashboard() {
            const enabled = getEnabledPlatforms();
            $('#stat-enabled').textContent = enabled.length;

            // Count total enabled capabilities across all platforms
            let capCount = 0;
            let cost = 0;
            enabled.forEach(slug => {
                capCount += getEnabledCapabilities(slug).length;
                const p = getPlatform(slug);
                // Simple cost: add paid tier price if platform has one and isn't bundled
                if (p?.pricing?.paid && !p.bundledIn) cost += p.pricing.paid.price || 0;
            });
            $('#stat-capabilities').textContent = capCount;
            $('#stat-cost').textContent = '$' + cost.toFixed(2);

            // Recent activity count
            const log = getActivityLog();
            $('#stat-activity').textContent = log.length;

            // Build enabled grid
            const grid = $('#enabled-grid');
            const empty = $('#enabled-empty');
            if (enabled.length === 0) {
                empty.style.display = 'block';
            } else {
                grid.innerHTML = enabled.map(slug => {
                    const p = getPlatform(slug);
                    if (!p) return '';
                    const caps = getEnabledCapabilities(slug).length;
                    return `
                    <div class="col-md-6 col-lg-4">
                        <a href="enable.html?platform=${p.slug}" class="platform-card enabled d-block text-decoration-none text-dark">
                            <div class="platform-icon" style="background:${p.gradient}">
                                <i class="fa-solid ${p.icon}"></i>
                            </div>
                            <h5>${p.name}</h5>
                            <p class="platform-tagline">${p.tagline}</p>
                            <span class="platform-status status-enabled">
                                <i class="fa-solid fa-check me-1"></i>${caps} capabilit${caps === 1 ? 'y' : 'ies'} on
                            </span>
                        </a>
                    </div>`;
                }).join('');
            }

            // Recent activity table (last 5)
            const recent = log.slice(0, 5);
            const tbody = $('#activity-body');
            if (recent.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="empty-state"><i class="fa-solid fa-wave-square"></i><br>No activity yet</td></tr>';
            } else {
                tbody.innerHTML = recent.map(entry => `
                    <tr>
                        <td style="padding-left:1.25rem"><code>${entry.type}</code></td>
                        <td class="text-muted small">${JSON.stringify(entry.payload)}</td>
                        <td style="padding-right:1.25rem" class="text-muted small">${formatDateTime(entry.at)}</td>
                    </tr>
                `).join('');
            }
        }
    </script>
</body>
</html>
