<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity — AlohaOne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/alohaone.css" rel="stylesheet">
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div class="top-bar">
            <h1>Activity</h1>
        </div>
        <div id="alert-area"></div>

        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h5 class="mb-0">Recent Activity</h5>
                <span class="small text-muted" id="activity-count">0 events</span>
            </div>
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th style="padding-left:1.25rem">Event</th>
                            <th>Details</th>
                            <th style="padding-right:1.25rem">When</th>
                        </tr>
                    </thead>
                    <tbody id="activity-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/alohaone.js"></script>
    <script>
        if (requireAuth()) {
            initAppShell('history').then(loadActivity);
        }

        function loadActivity() {
            const log = getActivityLog();
            $('#activity-count').textContent = `${log.length} event${log.length === 1 ? '' : 's'}`;
            const tbody = $('#activity-body');
            if (log.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="empty-state"><i class="fa-solid fa-wave-square"></i><br>No activity yet</td></tr>';
                return;
            }
            tbody.innerHTML = log.map(entry => `
                <tr>
                    <td style="padding-left:1.25rem"><code>${entry.type}</code></td>
                    <td class="text-muted small">${JSON.stringify(entry.payload)}</td>
                    <td style="padding-right:1.25rem" class="text-muted small">${formatDateTime(entry.at)}</td>
                </tr>
            `).join('');
        }
    </script>
</body>
</html>
