<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog — AlohaOne</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <link href="css/alohaone.css" rel="stylesheet">
    <style>
        .catalog-card {
            border: 1px solid #e5e7eb;
            border-radius: 0.75rem;
            background: #fff;
            padding: 1.25rem;
            height: 100%;
            display: flex;
            flex-direction: column;
            transition: box-shadow 0.15s ease;
        }
        .catalog-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
        .catalog-card .platform-icon {
            font-size: 1.75rem;
            width: 3rem;
            height: 3rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            background: linear-gradient(135deg, #0ea5e9, #0369a1);
            color: #fff;
            margin-bottom: 0.75rem;
        }
        .catalog-card h5 { margin-bottom: 0.25rem; }
        .catalog-card .platform-desc {
            color: #6b7280;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .tier-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-top: auto;
        }
        .tier-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0.75rem;
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            background: #f9fafb;
        }
        .tier-row .tier-name { font-weight: 600; }
        .tier-row .tier-price {
            font-weight: 700;
            color: #0f172a;
            font-variant-numeric: tabular-nums;
        }
        .tier-row .tier-price .per { font-weight: 400; color: #6b7280; font-size: 0.85em; }
        .cart-button {
            position: relative;
        }
        .cart-count-badge {
            position: absolute;
            top: -6px;
            right: -8px;
            background: #ef4444;
            color: #fff;
            border-radius: 999px;
            min-width: 20px;
            height: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0 5px;
        }
        .catalog-empty {
            text-align: center;
            padding: 3rem 1rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <div id="sidebar-container"></div>

    <div class="main-content">
        <div class="top-bar d-flex justify-content-between align-items-center">
            <div>
                <h1>Catalog</h1>
                <p class="text-muted mb-0 small">
                    Pick a plan from any AlohaOne platform. Add it to your cart to subscribe.
                </p>
            </div>
            <a href="cart.html" class="btn btn-outline-primary cart-button">
                <i class="fa-solid fa-cart-shopping me-1"></i> Cart
                <span class="cart-count-badge" id="cart-count-badge" style="display:none">0</span>
            </a>
        </div>
        <div id="alert-area"></div>

        <div id="catalog-loading" class="text-center py-5">
            <i class="fas fa-circle-notch fa-spin me-2"></i>
            Loading catalog…
        </div>

        <div id="catalog-root" class="row g-4" style="display:none"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/alohaone.js"></script>
    <script src="js/catalog.js"></script>
    <script>
        if (requireAuth()) {
            initAppShell('catalog').then(initCatalogView);
        }
    </script>
</body>
</html>
