<div class="settings-view">
    <div class="settings-header">
        <h1><i class="fas fa-clock-rotate-left me-2"></i>Activity Log</h1>
        <p class="text-muted">Every account event, in reverse chronological order.</p>
    </div>

    <div class="settings-card">
        <div id="activity-feed-full">
            <!-- populated by initActivityView -->
        </div>
    </div>
</div>

<script>
function initActivityView() {
    const log = (typeof getActivityLog === 'function') ? getActivityLog() : [];
    const el = document.getElementById('activity-feed-full');
    if (log.length === 0) {
        el.innerHTML = `
            <div class="empty-state-small text-muted text-center py-4">
                <i class="fas fa-stream me-2"></i>No activity recorded yet.
            </div>`;
        return;
    }
    el.innerHTML = `<table class="table table-hover">
        <thead><tr><th>Event</th><th>Details</th><th>When</th></tr></thead>
        <tbody>` +
        log.map(entry => `<tr>
            <td><code>${entry.type}</code></td>
            <td class="text-muted small">${JSON.stringify(entry.payload)}</td>
            <td class="text-muted small">${(typeof formatDateTime === 'function') ? formatDateTime(entry.at) : entry.at}</td>
        </tr>`).join('') +
        `</tbody></table>`;
}
</script>
